--- # PROD.main.yml
name: Azure Deploy (PROD.main)
on:
  push:
    branches: [main]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
      - name: Install Node
        id: node
        uses: actions/setup-node@v6
        with: {node-version: 24}
      - name: Install Dependencies
        id: ci
        run: npm ci --loglevel=error --fund=false
      - name: Build App
        id: build
        run: npm run deploy
      - name: Stage to Azure
        id: stage
        uses: actions/upload-artifact@v7
        with:
          name: node-app
          path: .
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Staged App
        id: download
        uses: actions/download-artifact@v8
        with: {name: node-app}
      - name: Authenticate to Azure
        id: auth
        uses: Azure/login@v3
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_BD76939ACA624269B26A85FA2C0BE504 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B1E50992F72D46D8878C19B812ED6A83 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5C777EC11F114D688D30FA6C27187915 }}
      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "agent-client"
          slot-name: "Production"
          package: .
...
